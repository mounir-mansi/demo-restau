<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- SEO fondamentale -->
    <title>Il Bel Piatto — Ristorante &amp; Snack a Parigi</title>
    <meta name="description" content="Ristorante e snack nel cuore di Parigi. Cucina generosa, prodotti freschi selezionati ogni mattina, atmosfera accogliente. Aperto lun–sab 11:00–23:00." />
    <link rel="canonical" href="https://demo-restau.mandev.fr" />

    <!-- Open Graph -->
    <meta property="og:type"        content="restaurant" />
    <meta property="og:site_name"   content="Il Bel Piatto" />
    <meta property="og:title"       content="Il Bel Piatto — Ristorante &amp; Snack a Parigi" />
    <meta property="og:description" content="Ristorante e snack nel cuore di Parigi. Cucina generosa, prodotti freschi selezionati ogni mattina, atmosfera accogliente." />
    <meta property="og:url"         content="https://demo-restau.mandev.fr" />
    <meta property="og:image"       content="https://demo-restau.mandev.fr/hero.jpg" />
    <meta property="og:locale"      content="it_IT" />

    <!-- Twitter Card -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Il Bel Piatto — Ristorante &amp; Snack a Parigi" />
    <meta name="twitter:description" content="Cucina generosa, prodotti freschi, atmosfera accogliente nel cuore di Parigi. Aperto lun–sab 11:00–23:00." />
    <meta name="twitter:image"       content="https://demo-restau.mandev.fr/hero.jpg" />

    <!-- JSON-LD : FoodEstablishment -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FoodEstablishment",
      "name": "Il Bel Piatto",
      "description": "Ristorante e snack che propone una cucina generosa con prodotti freschi selezionati ogni mattina.",
      "url": "https://demo-restau.mandev.fr",
      "telephone": "+33600000000",
      "servesCuisine": ["Italiana", "Mediterranea"],
      "priceRange": "€€",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "12 rue des Saveurs",
        "addressLocality": "Paris",
        "postalCode": "75001",
        "addressCountry": "FR"
      },
      "openingHoursSpecification": [
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"],
          "opens": "11:00",
          "closes": "23:00"
        },
        {
          "@type": "OpeningHoursSpecification",
          "dayOfWeek": ["Sunday"],
          "opens": "12:00",
          "closes": "22:00"
        }
      ],
      "sameAs": [
        "https://www.instagram.com/ilbelpiatto",
        "https://www.facebook.com/ilbelpiatto"
      ]
    }
    </script>

    <!-- Polices -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,300;0,400;0,600;0,700;0,900;1,700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- LCP : precaricamento immagine hero -->
    <link rel="preload" href="/hero.jpg" as="image" fetchpriority="high" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
